app:
  name: "acumen-frontend"
  userId: "47bc71b3-1b1a-48c7-a72f-d5b809"
  projectName: "acumen-frontend"
  namespace: "ns-srunoudomsambath-03440941"
  framework: "static"
  containerPort: 80
  servicePort: 80
  domain: "autonomous-istad.com"
  host: "acumen-frontend-ns-srunoudomsambath-03440941.autonomous-istad.com" # managed-by-jenkins-host

image:
  repository: "harbor.devith.it.com/deployment-pipeline/47bc71b3-1b1a-48c7-a72f-d5b809/acumen-frontend"
  tag: "47bc71b3-1b1a-48c7-a72f-d5b809-71-f431d8800651" # managed-by-jenkins-image-tag
  pullPolicy: "IfNotPresent"

replicaCount: 1

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  tls:
    enabled: true
    secretName: "acumen-frontend-tls"

imagePullSecrets:
  - name: "registry-secret"

envJson: |
  []

probes:
  mode: "http"
  startup:
    enabled: false
    path: "/"
    initialDelaySeconds: 0
    periodSeconds: 5
    failureThreshold: 24
  readiness:
    enabled: true
    path: "/"
    initialDelaySeconds: 10
    periodSeconds: 10
    failureThreshold: 3
  liveness:
    enabled: true
    path: "/"
    initialDelaySeconds: 30
    periodSeconds: 15
    failureThreshold: 3
