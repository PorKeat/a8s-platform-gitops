app:
  name: "businessweb"
  userId: "10f6ae25-408d-465d-a4d7-442eaa"
  projectName: "businessweb"
  namespace: "ns-tochratana-edd03ef6"
  framework: "tailwind-static"
  containerPort: 80
  servicePort: 80
  domain: "autonomous-istad.com"
  host: "business-web.autonomous-istad.com" # managed-by-jenkins-host

image:
  repository: "gohabor.anajak-khmer.site/deployment-pipeline/10f6ae25-408d-465d-a4d7-442eaa/businessweb"
  tag: "businessweb-6d8cdd4c" # managed-by-jenkins-image-tag
  pullPolicy: "IfNotPresent"

replicaCount: 1

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  tls:
    enabled: true
    secretName: "businessweb-tls"

imagePullSecrets:
  - name: "registry-secret"

envJson: |
  []

probes:
  mode: "http"
  startup:
    enabled: false
    path: "/"
    initialDelaySeconds: 0
    periodSeconds: 5
    failureThreshold: 24
  readiness:
    enabled: true
    path: "/"
    initialDelaySeconds: 10
    periodSeconds: 10
    failureThreshold: 3
  liveness:
    enabled: true
    path: "/"
    initialDelaySeconds: 30
    periodSeconds: 15
    failureThreshold: 3
