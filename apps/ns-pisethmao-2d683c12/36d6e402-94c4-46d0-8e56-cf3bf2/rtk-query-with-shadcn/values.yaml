app:
  name: "rtk-query-with-shadcn"
  userId: "36d6e402-94c4-46d0-8e56-cf3bf2"
  projectName: "rtk-query-with-shadcn"
  namespace: "ns-pisethmao-2d683c12"
  framework: "nextjs"
  containerPort: 3000
  servicePort: 80
  domain: "autonomous-istad.com"
  host: "rtk-query-with-shadcn-ns-pisethmao-2d683c12.autonomous-istad.com" # managed-by-jenkins-host

image:
  repository: "goharbor-itp.anajak-khmer.site/deployment-pipeline/36d6e402-94c4-46d0-8e56-cf3bf2/rtk-query-with-shadcn"
  tag: "rtk-query-with-shadcn-bd8a391e" # managed-by-jenkins-image-tag
  pullPolicy: "IfNotPresent"

replicaCount: 1

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  tls:
    enabled: true
    secretName: "rtk-query-with-shadcn-tls"

imagePullSecrets:
  - name: "registry-secret"

envJson: |
  []

probes:
  mode: "http"
  startup:
    enabled: false
    path: "/"
    initialDelaySeconds: 0
    periodSeconds: 5
    failureThreshold: 24
  readiness:
    enabled: true
    path: "/"
    initialDelaySeconds: 10
    periodSeconds: 10
    failureThreshold: 3
  liveness:
    enabled: true
    path: "/"
    initialDelaySeconds: 30
    periodSeconds: 15
    failureThreshold: 3
