app:
  name: "camhotel-ui"
  userId: "37bf525a-8ed2-4c6a-8f0a-05a248"
  projectName: "camhotel-ui"
  namespace: "ns-chengdevith-f00120b6"
  framework: "nextjs"
  containerPort: 3000
  servicePort: 80
  domain: "autonomous-istad.com"
  host: "camhotel-ui-ns-chengdevith-f00120b6.autonomous-istad.com" # managed-by-jenkins-host

image:
  repository: "goharbor-itp.anajak-khmer.site/deployment-pipeline/37bf525a-8ed2-4c6a-8f0a-05a248/camhotel-ui"
  tag: "camhotel-ui-184c3412" # managed-by-jenkins-image-tag
  pullPolicy: "IfNotPresent"

replicaCount: 1

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  tls:
    enabled: true
    secretName: "camhotel-ui-tls"

imagePullSecrets:
  - name: "registry-secret"

envJson: |
  [{"name":"NEXT_PUBLIC_API","value":"","secret":true}]

vault:
  enabled: true
  secretStoreName: "vault-backend"
  secretStoreKind: "ClusterSecretStore"
  envPath: "monolithic/ns-chengdevith-f00120b6/cc23af20-5495-4f40-86ba-cbf8a8387229/env"

probes:
  mode: "http"
  startup:
    enabled: false
    path: "/"
    initialDelaySeconds: 0
    periodSeconds: 5
    failureThreshold: 24
  readiness:
    enabled: true
    path: "/"
    initialDelaySeconds: 10
    periodSeconds: 10
    failureThreshold: 3
  liveness:
    enabled: true
    path: "/"
    initialDelaySeconds: 30
    periodSeconds: 15
    failureThreshold: 3
