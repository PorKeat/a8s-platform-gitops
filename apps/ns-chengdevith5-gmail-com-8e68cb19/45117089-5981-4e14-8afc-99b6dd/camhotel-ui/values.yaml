app:
  name: "camhotel-ui"
  userId: "45117089-5981-4e14-8afc-99b6dd"
  projectName: "camhotel-ui"
  namespace: "ns-chengdevith5-gmail-com-8e68cb19"
  framework: "nextjs"
  containerPort: 3000
  servicePort: 80
  domain: "autonomous-istad.com"
  host: "facebook.devith.it.com" # managed-by-jenkins-host

image:
  repository: "goharbor-itp.anajak-khmer.site/deployment-pipeline/45117089-5981-4e14-8afc-99b6dd/camhotel-ui"
  tag: "camhotel-ui-0feb95b4" # managed-by-jenkins-image-tag
  pullPolicy: "IfNotPresent"

replicaCount: 1

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  tls:
    enabled: true
    secretName: "camhotel-ui-tls"

imagePullSecrets:
  - name: "registry-secret"

envJson: |
  [{"name":"NEXT_PUBLIC_API","value":"","secret":true}]

vault:
  enabled: true
  secretStoreName: "vault-backend"
  secretStoreKind: "ClusterSecretStore"
  envPath: "monolithic/ns-chengdevith5-gmail-com-8e68cb19/8c866d26-81c8-4e17-a118-4ee361948ed8/env"

probes:
  mode: "http"
  startup:
    enabled: false
    path: "/"
    initialDelaySeconds: 0
    periodSeconds: 5
    failureThreshold: 24
  readiness:
    enabled: true
    path: "/"
    initialDelaySeconds: 10
    periodSeconds: 10
    failureThreshold: 3
  liveness:
    enabled: true
    path: "/"
    initialDelaySeconds: 30
    periodSeconds: 15
    failureThreshold: 3
