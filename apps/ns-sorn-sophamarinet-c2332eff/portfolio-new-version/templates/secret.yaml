{{- $envJson := trim (default "" .Values.envJson) }}
{{- $envVars := .Values.env | default (list) }}
{{- if $envJson }}
{{- if hasPrefix "[" $envJson }}
{{- $envVars = fromJsonArray $envJson }}
{{- else }}
{{- $envVars = fromJson $envJson }}
{{- end }}
{{- end }}
{{- if kindIs "map" $envVars }}
{{- $normalizedEnv := list }}
{{- range $name, $rawValue := $envVars }}
{{- $normalizedEnv = append $normalizedEnv (dict "name" (printf "%s" $name) "value" (printf "%v" $rawValue)) }}
{{- end }}
{{- $envVars = $normalizedEnv }}
{{- end }}
{{- $secretEnv := list }}
{{- range $envVar := $envVars }}
{{- if and (kindIs "map" $envVar) $envVar.secret }}
{{- $secretEnv = append $secretEnv $envVar }}
{{- end }}
{{- end }}
{{- if $secretEnv }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "tenant-app.fullname" . }}-env
  namespace: {{ .Values.app.namespace }}
  labels:
    {{- include "tenant-app.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $envVar := $secretEnv }}
  {{ $envVar.name }}: {{ printf "%v" (default "" $envVar.value) | quote }}
  {{- end }}
{{- end }}
